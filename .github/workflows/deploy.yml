name: Release and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'main'
        type: choice
        options:
          - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  determine_environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [determine_environment]
    timeout-minutes: 10
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout released branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Configure release identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump package version
        id: bump
        run: |
          VERSION=$(node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const parts = pkg.version.split('.').map(Number);
          if (parts.length !== 3 || parts.some(Number.isNaN)) {
            throw new Error(`Unsupported package version: ${pkg.version}`);
          }
          parts[2] += 1;
          pkg.version = parts.join('.');
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          console.log(pkg.version);
          NODE
          )
          bun install --lockfile-only
          git add package.json bun.lock
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  deploy_fabric:
    name: Deploy to Fabric
    runs-on: ubuntu-latest
    needs: [determine_environment, release]
    if: needs.release.result == 'success'
    timeout-minutes: 15
    env:
      HARPER_STUDIO_URL: https://fabric.harper.fast
      HARPER_CLUSTER_URL: ${{ vars.HARPER_CLUSTER_URL }}
      HARPER_CLUSTER_ID: ${{ vars.HARPER_CLUSTER_ID }}
      HARPER_ADMIN_USERNAME: ${{ secrets.HARPER_ADMIN_USERNAME }}
      HARPER_ADMIN_PASSWORD: ${{ secrets.HARPER_ADMIN_PASSWORD }}
    steps:
      - name: Checkout released branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Verify required secrets are wired
        run: |
          if [ -z "${HARPER_ADMIN_USERNAME}" ] || [ -z "${HARPER_ADMIN_PASSWORD}" ]; then
            echo "::error::HARPER_ADMIN_USERNAME / HARPER_ADMIN_PASSWORD secrets are not set on the repo." >&2
            exit 1
          fi

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Build and deploy harper-app to Fabric
        run: bun run deploy

      - name: Install Playwright Chromium browser
        run: bunx playwright install --with-deps chromium

      - name: Smoke-test the deployed UI
        env:
          BASE_URL: ${{ env.HARPER_CLUSTER_URL }}
        run: bun run smoke

      - name: Upload smoke screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: tests/screenshots/
          if-no-files-found: ignore

      - name: Report deployed version
        run: echo "Deployed version ${{ needs.release.outputs.version }} to ${{ needs.determine_environment.outputs.environment }}"
